{% extends 'accounts/base.html' %}
{% load socialaccount %}
{% block content %}
    <h2>Login</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Login</button>
    </form>
    <hr>
    <a href="{% provider_login_url 'google' %}">Login with Google</a>
    <p>Don't have an account? <a href="{% url 'register' %}">Register</a></p>
{% endblock %}
