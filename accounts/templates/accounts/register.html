{% extends 'accounts/base.html' %}
{% load socialaccount %}
{% block content %}
    <h2>Register</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Register</button>
    </form>
    <hr>
    <a href="{% provider_login_url 'google' %}">Sign up with Google</a>
    <p>Already have an account? <a href="{% url 'login' %}">Login</a></p>
{% endblock %}
