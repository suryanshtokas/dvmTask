{% extends 'accounts/base.html' %}
{% block content %}
    <h2>Top Up Wallet</h2>
    <p>Current Balance: ${{ request.user.wallet.balance }}</p>
    <form method="POST">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Top Up</button>
    </form>
    <br><a href="{% url 'wallet' %}">Back to Wallet</a>
{% endblock %}
